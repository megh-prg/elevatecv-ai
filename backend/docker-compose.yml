version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: resume_optimizer_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - resume-network

  redis:
    image: redis:7-alpine
    container_name: resume_optimizer_redis
    ports:
      - "6379:6379"
    networks:
      - resume-network

  fastapi:
    build: .
    container_name: resume_optimizer_api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://root:password@mongodb:27017
      - MONGODB_NAME=resume_optimizer
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
    depends_on:
      - mongodb
      - redis
    networks:
      - resume-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery:
    build: .
    container_name: resume_optimizer_worker
    environment:
      - MONGODB_URI=mongodb://root:password@mongodb:27017
      - MONGODB_NAME=resume_optimizer
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
    depends_on:
      - mongodb
      - redis
    networks:
      - resume-network
    command: celery -A worker.tasks worker --loglevel=info

volumes:
  mongo_data:

networks:
  resume-network:
    driver: bridge
